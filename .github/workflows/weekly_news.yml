name: Weekly News Check

on:
  schedule:
    - cron: '0 23 * * 3'  # 毎週木曜 08:00 JST (= 水曜 23:00 UTC)
  workflow_dispatch:        # 手動実行も可能

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: |
          cd news
          python scraper.py

      - name: Generate HTML
        run: python generate_html.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news/snapshots/ news/news.json index.html
          git diff --staged --quiet || git commit -m "Weekly news update $(date +'%Y-%m-%d')"
          git push
